<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT PROJECT Q4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-image: url(BG.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }

        .layout{
            display: flex;
        }

        .sidebar{
            width: 240px;
            background: linear-gradient(to bottom, #111827, #1f2937);
            color: white;
            padding: 25px;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar a{
            text-decoration: none;
            margin: 10px 0;
            display: flex;
            align-items: center;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .sidebar a:hover{
            background: rgba(255,255,255,0.1);
            color: #93c5fd;
            transform: translateX(5px);
        }

        .sidebar .active{
            background: rgba(255,255,255,0.1);
            color: #93c5fd;
        }

        .logo{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 20px auto;
            border: 3px solid white;
        }

        .main{
            flex: 1;
            padding: 30px;
        }

        .simple-footer{
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        padding: 1px;
        text-align: center;
        font-family: Arial, sans-serif;
        font-size: 12px;
        background-color: #f5f5f5;
        border-top: 2px solid #ddd;
        color: #333;
        z-index: 1000;
        }

        .simple-footer p{
            margin: 4px 0;
        }
    </style>

</head>

<body class="bg-light">
    <div class="layout">
        <div class="sidebar">
            <img src="LOGO.jpg" class="logo">

            <a href="dashboard.html">Dashboard</a>
            <a href="notebooks.html">Virtual Notebooks</a>
            <a href="tasks.html">Tasks</a>
            <a href="profile.html" class="active">Profile</a>

            <a class="btn btn-danger w-100 mt-3" href="index.html">
                Logout
            </a>

        </div>

        <main class="main">
            <div class="row mt-5 justify-content-center">
                <div class="col-md-3 text-center">
                    <div 
                        id="profileDisplay"
                        class="rounded-circle d-inline-block mb-3"
                        style="
                            width: 150px;
                            height: 150px;
                            background-size: cover;
                            background-position: center;
                            border: 2px solid #ddd;
                            background-image: url('PFP.jpeg');
                        ">
                    </div>
                    <h3>Sir Balajadia</h3>
                    <input 
                        type="file"
                        class="form-control form-control-sm"
                        id="formFile"
                        accept="image/*"
                        onchange="previewImage(event)"
                    >

                </div>

                <div class="col-md-5">
                    <div class="card shadow-sm border-0 p-4">
                        <h3 class="border-bottom pb-2">
                            Student Information
                        </h3>
                        <div class="mt-3">
                            <p>
                                <strong>Student ID:</strong> SN123456
                            </p>

                            <p>
                                <strong>Contact Number:</strong> +639150000001
                            </p>

                            <p>
                                <strong>Email Address:</strong>
                                lrbalajadia@obmontessori.edu.ph
                            </p>

                            <p>
                                <strong>Gender:</strong>
                            </p>

                        </div>

                        <button 
                            class="btn btn-info text-white w-100 mt-3"
                            onclick="window.alert('You must contact your adviser before changing passwords.')">

                            Change Password

                        </button>

                    </div>

                </div>

            </div>

        </main>

    </div>

    <footer class="simple-footer">
        <p>Sydney de Leon, Cassey Mallari, Casey Canlas</p>
        <p>Grade & Section: Grade 9 - Ruby</p>
    </footer>

    <script src="proj.js"></script>

    <script>

        function previewImage(event){
            const imageField = document.getElementById("profileDisplay");
            const file = event.target.files[0];

            if (file){
                imageField.style.backgroundImage =
                    "url(" + URL.createObjectURL(file) + ")";

                imageField.style.backgroundColor = "transparent";

            }
        }
    </script>
</body>
</html>
