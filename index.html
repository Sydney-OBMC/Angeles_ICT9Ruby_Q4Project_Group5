<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICT PROJECT Q4</title>
   <style>
    *{
      box-sizing: border-box;
    }

    body{
      margin: 0;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      color: #333;
      background: linear-gradient(45deg, #f5f5f5, #e8e8e8, #d3d3d3, #c0c0c0);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientShift{
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-container{
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .login-container:hover {
      transform: translateY(-3px);
      transition: 0.3s ease;
    }

    .header{
        text-align: center;
        margin-bottom: 20px;
    }

    .header h1{
        font-size: 1.2rem;
        font-weight: 400;
        color: #201d1d;
        margin: 0;
        letter-spacing: 1px;
    }

    .header h2{
        font-size: 2rem;
        font-weight: 800;
        margin: 5px 0;
        color: #201d1d;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .header p{
        margin: 5px 0 0;
        font-size: 0.95rem;
        color: #201d1d;
    }

    .logo{
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 20px auto;
      outline: 3px solid rgb(6, 2, 58);
    }

    .logo-container{
      text-align: center;
    }

    .form-group{
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label{
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .form-group input{
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: #666;
      outline: none;
      box-shadow: 0 0 8px rgba(102, 102, 102, 0.3);
    }

    .options{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .options label{
      font-size: 0.9rem;
      color: #666;
    }

    .options input[type="checkbox"]{
      margin-right: 5px;
    }

    .buttons{
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .button:hover {
      opacity: 0.9;
    }

    .button {
      font-weight: bold;
    }

    .button{
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .button{
      transition: all 0.3s ease;
    }

    .button-primary{
      background: #333;
      color: white;
    }

    .button-primary:hover{
      transform: translateY(-2px);
    }

    .button-secondary{
      background: #f0f0f0;
      color: #333;
    }

    .button-secondary:hover{
      background: #e0e0e0;
    }

    .footer{
      margin-top: 20px;
    }

    .footer a{
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .footer a:hover{
      text-decoration: underline;
    }

    .session-text{
      font-size: 0.8rem;
      color: #999;
    }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
      <header class="header">
        <h1>Welcome to</h1>
        <h2>ATLANTA HIGH SCHOOL</h2>
        <p>Please log in to continue</p>
    </header>

    <div class="logo-container">
      <img src="LOGO.jpg" class="logo">
    </div>
        <form onsubmit="return loginUser()">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                id="username"
                type="text"
                required
                placeholder="Enter here"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    id="password"
                    type="password"
                    required
                    placeholder="Enter here"
                >
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" checked>
                    Stay logged in
                </label>

                <span class="session-text">
                    Your session will stay active on this device.
                </span>
            </div>

            <br>
            
            <div class="buttons">
                <button type="submit" class="button button-primary">
                    Login
                </button>

                <button type="reset" class="button button-secondary">
                    Cancel
                </button>
            </div>

            <div class="footer">
                <a href="#">Forgot username / password?</a>
            </div>
        </form>
        
    <script>
    function loginUser(){
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const correctUsername = "Sir Balajadia";
        const correctPassword = "676767";

        if (username === correctUsername && password === correctPassword){
            window.location.href = "dashboard.html";
            return false;
        } else {
            alert("Incorrect username or password.");
            return false;
        }
    }
    </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
